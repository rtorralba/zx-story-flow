<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX Adventure Builder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>ZX Adventure Builder</h1>
            <nav class="menubar">
                <button id="add-screen-btn">Add Screen Node</button>

                <div class="menu">
                    <button class="menu-button">Project</button>
                    <div class="submenu">
                        <button id="save-btn">Save</button>
                        <button id="load-btn">Load</button>
                    </div>
                </div>

                <div class="menu">
                    <button class="menu-button">Export</button>
                    <div class="submenu submenu-right">
                        <button id="export-tap-btn">.TAP</button>
                        <button id="export-mucho-btn">MuCho</button>
                        <button id="export-btn">BASIC</button>
                    </div>
                </div>

                <input type="file" id="load-input" style="display: none;" accept=".json">
            </nav>
        </header>

        <main>
            <div id="editor-container">
                <canvas id="node-canvas"></canvas>
            </div>

            <aside id="property-panel">
                <h2>Properties</h2>
                <div id="properties-content">
                    <p>Select a node to edit properties.</p>
                </div>
            </aside>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
