<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX Story Flow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>
                <img src="images/logo_header.png" alt="ZX Story Flow" id="header-logo">
                <span id="project-name-display"></span>
            </h1>
            <nav class="menubar">
                <button id="add-screen-btn" data-i18n="menu.screen">📺 Screen</button>
                <button id="add-group-btn" data-i18n="menu.group">📦 Group</button>
                <button id="add-reference-btn" data-i18n="menu.reference">🔗 Reference</button>

                <div class="menu">
                    <button class="menu-button" data-i18n="menu.project">📁 Project</button>
                    <div class="submenu">
                        <button id="new-btn" data-i18n="project.new">📄 Nuevo</button>
                        <button id="save-btn" data-i18n="project.save">💾 Save</button>
                        <button id="load-btn" data-i18n="project.load">📂 Load</button>
                    </div>
                </div>

                <div class="menu">
                    <button class="menu-button" data-i18n="menu.export">📤 Export</button>
                    <div class="submenu submenu-right">
                        <button id="export-png-btn" data-i18n="export.png">🖼️ PNG Image</button>
                        <button id="export-tap-btn" data-i18n="export.tap">📼 .TAP</button>
                        <button id="export-mucho-btn" data-i18n="export.mucho">📜 MuCho</button>
                        <button id="export-btn" data-i18n="export.basic">⌨️ BASIC</button>
                    </div>
                </div>

                <button id="config-btn" data-i18n="menu.config">⚙️ Config</button>

                <div class="menu" style="margin-left: auto;">
                    <button class="menu-button" id="lang-btn">🌐 <span id="current-lang">ES</span></button>
                    <div class="submenu submenu-right">
                        <button class="lang-option" data-lang="es">ES</button>
                        <button class="lang-option" data-lang="en">EN</button>
                        <button class="lang-option" data-lang="pt">PT</button>
                    </div>
                </div>

                <button id="fullscreen-btn" data-i18n="menu.fullscreen">⛶ Fullscreen</button>

                <input type="file" id="load-input" style="display: none;" accept=".json">
            </nav>
        </header>

        <main>
            <div id="editor-container">
                <canvas id="node-canvas"></canvas>
            </div>

            <aside id="property-panel" class="hidden">
                <h2 data-i18n="properties.title">Properties</h2>
                <div id="properties-content">
                    <p data-i18n="properties.empty">Select a node to edit properties.</p>
                </div>
                <hr>
                <section id="separator-config" style="display: none;">
                    <div class="config-row">
                        <label>
                            <input type="checkbox" id="use-custom-config">
                            <span data-i18n="properties.specific_config">Configuración específica</span>
                        </label>
                    </div>
                    <div id="custom-config-content" style="display: none;">
                        <h3 data-i18n="properties.page">Página</h3>
                        <div class="config-options">
                            <div class="config-row">
                                <label for="page-ink">INK:</label>
                                <select id="page-ink" name="page-ink">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                                <label for="page-paper" style="margin-left: 5px;"
                                    data-i18n="properties.paper">PAPER:</label>
                                <select id="page-paper" name="page-paper">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                            </div>
                            <div class="config-row">
                                <label for="page-bright" data-i18n="properties.bright">Bright</label>
                                <input type="checkbox" id="page-bright" name="page-bright">
                                <label for="page-flash" style="margin-left: 5px;"
                                    data-i18n="properties.flash">Flash</label>
                                <input type="checkbox" id="page-flash" name="page-flash">
                            </div>
                        </div>
                        <h3 data-i18n="properties.separator">Separador</h3>
                        <div class="config-options">
                            <div class="config-row">
                                <label for="separator-ink" data-i18n="properties.ink">INK:</label>
                                <select id="separator-ink" name="separator-ink">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                                <label for="separator-paper" style="margin-left: 5px;"
                                    data-i18n="properties.paper">PAPER:</label>
                                <select id="separator-paper" name="separator-paper">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                            </div>
                            <div class="config-row">
                                <label for="separator-bright" data-i18n="properties.bright">Bright</label>
                                <input type="checkbox" id="separator-bright" name="separator-bright">
                                <label for="separator-flash" style="margin-left: 5px;"
                                    data-i18n="properties.flash">Flash</label>
                                <input type="checkbox" id="separator-flash" name="separator-flash">
                            </div>
                        </div>
                        <h3 data-i18n="properties.options">Opciones</h3>
                        <div class="config-options">
                            <div class="config-row">
                                <label for="interface-ink" data-i18n="properties.ink">INK:</label>
                                <select id="interface-ink" name="interface-ink">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                                <label for="interface-paper" style="margin-left: 5px;"
                                    data-i18n="properties.paper">PAPER:</label>
                                <select id="interface-paper" name="interface-paper">
                                    <option value="black" data-i18n="colors.black">Negro</option>
                                    <option value="blue" data-i18n="colors.blue">Azul</option>
                                    <option value="red" data-i18n="colors.red">Rojo</option>
                                    <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                                    <option value="green" data-i18n="colors.green">Verde</option>
                                    <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                                    <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                                    <option value="white" data-i18n="colors.white">Blanco</option>
                                </select>
                            </div>
                            <div class="config-row">
                                <label for="interface-bright" data-i18n="properties.bright">Bright</label>
                                <input type="checkbox" id="interface-bright" name="interface-bright">
                                <label for="interface-flash" style="margin-left: 5px;"
                                    data-i18n="properties.flash">Flash</label>
                                <input type="checkbox" id="interface-flash" name="interface-flash">
                            </div>
                        </div>
                    </div>
                </section>
            </aside>
        </main>

        <!-- Modal de configuración global -->
        <div id="global-config-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
                <h2 data-i18n="config.global_title">Configuración Global (por defecto)</h2>
                <h3 data-i18n="properties.page">Página</h3>
                <div class="config-options">
                    <div class="config-row">
                        <label for="global-page-ink" data-i18n="properties.ink">INK:</label>
                        <select id="global-page-ink">
                            <option value="black" data-i18n="colors.black">Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white" selected>Blanco</option>
                        </select>
                        <label for="global-page-paper" style="margin-left: 5px;"
                            data-i18n="properties.paper">PAPER:</label>
                        <select id="global-page-paper">
                            <option value="black" data-i18n="colors.black" selected>Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white">Blanco</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label for="global-page-bright" data-i18n="properties.bright">Bright</label>
                        <input type="checkbox" id="global-page-bright">
                        <label for="global-page-flash" style="margin-left: 5px;"
                            data-i18n="properties.flash">Flash</label>
                        <input type="checkbox" id="global-page-flash">
                    </div>
                </div>
                <br><br>
                <h3 data-i18n="properties.separator">Separador</h3>
                <div class="config-options">
                    <div class="config-row">
                        <label for="global-separator-ink" data-i18n="properties.ink">INK:</label>
                        <select id="global-separator-ink">
                            <option value="black" data-i18n="colors.black">Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white" selected>Blanco</option>
                        </select>
                        <label for="global-separator-paper" style="margin-left: 5px;"
                            data-i18n="properties.paper">PAPER:</label>
                        <select id="global-separator-paper">
                            <option value="black" data-i18n="colors.black" selected>Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white">Blanco</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label for="global-separator-bright" data-i18n="properties.bright">Bright</label>
                        <input type="checkbox" id="global-separator-bright">
                        <label for="global-separator-flash" style="margin-left: 5px;"
                            data-i18n="properties.flash">Flash</label>
                        <input type="checkbox" id="global-separator-flash">
                    </div>
                </div>
                <br><br>
                <h3 data-i18n="properties.options">Opciones</h3>
                <div class="config-options">
                    <div class="config-row">
                        <label for="global-interface-ink" data-i18n="properties.ink">INK:</label>
                        <select id="global-interface-ink">
                            <option value="black" data-i18n="colors.black">Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white" selected>Blanco</option>
                        </select>
                        <label for="global-interface-paper" style="margin-left: 5px;"
                            data-i18n="properties.paper">PAPER:</label>
                        <select id="global-interface-paper">
                            <option value="black" data-i18n="colors.black" selected>Negro</option>
                            <option value="blue" data-i18n="colors.blue">Azul</option>
                            <option value="red" data-i18n="colors.red">Rojo</option>
                            <option value="magenta" data-i18n="colors.magenta">Magenta</option>
                            <option value="green" data-i18n="colors.green">Verde</option>
                            <option value="cyan" data-i18n="colors.cyan">Cyan</option>
                            <option value="yellow" data-i18n="colors.yellow">Amarillo</option>
                            <option value="white" data-i18n="colors.white">Blanco</option>
                        </select>
                    </div>
                    <div class="config-row">
                        <label for="global-interface-bright" data-i18n="properties.bright">Bright</label>
                        <input type="checkbox" id="global-interface-bright">
                        <label for="global-interface-flash" style="margin-left: 5px;"
                            data-i18n="properties.flash">Flash</label>
                        <input type="checkbox" id="global-interface-flash">
                    </div>
                </div>
                <br><br>
                <h3 data-i18n="config.edit_interface">Interfaz de Edición</h3>
                <div class="config-options">
                    <div class="config-row">
                        <label for="global-view-mode" data-i18n="config.default_view">Modo de edición por
                            defecto:</label>
                        <select id="global-view-mode">
                            <option value="simple" data-i18n="config.view_simple">Vista Sencilla</option>
                            <option value="advanced" data-i18n="config.view_advanced">Vista Avanzada</option>
                        </select>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button id="close-global-config" data-i18n="config.close">Cerrar</button>
                </div>
            </div>
        </div>

        <!-- Modal de edición de nodo -->
        <div id="node-edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" id="node-edit-modal-wrapper">
                <button class="modal-close-btn" id="node-edit-modal-close-btn">&times;</button>
                <h2 id="node-edit-modal-title" data-i18n="editor.edit_node">Editar Nodo</h2>
                <div id="node-edit-modal-content">
                    <!-- El contenido se generará dinámicamente -->
                </div>
                
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
 
<!-- Compact modal para edición de Grupos y Referencias (más estrecho, sin switch de vista) -->
<div id="compact-edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" id="compact-edit-modal-wrapper">
        <button class="modal-close-btn" id="compact-edit-modal-close-btn">&times;</button>
        <h2 id="compact-edit-modal-title"></h2>
        <div id="compact-edit-modal-content">
            <!-- Contenido generado dinámicamente -->
        </div>
        
    </div>
</div>
