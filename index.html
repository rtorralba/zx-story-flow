    <script type="module">
        import { mountCYDEditor } from './js/cyd-codemirror.js';
        // Montar siempre al cargar (funciona aunque la sección esté oculta)
        window.addEventListener('DOMContentLoaded', () => {
            mountCYDEditor('cyd-general-code');
            mountCYDEditor('cyd-general-code-end');

            // Tab switching
            document.querySelectorAll('.code-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.target;
                    document.querySelectorAll('.code-tab-btn').forEach(b => b.classList.remove('code-tab-active'));
                    document.querySelectorAll('.code-tab-panel').forEach(p => p.style.display = 'none');
                    btn.classList.add('code-tab-active');
                    const panel = document.getElementById(target);
                    if (panel) {
                        panel.style.display = '';
                        const ta = panel.querySelector('textarea');
                        if (ta && ta._cmInstance) setTimeout(() => ta._cmInstance.refresh(), 0);
                    }
                });
            });
        });
        // Exponer para llamadas desde app.js: monta si no está montado, y siempre refresca
        window.showCYDEditor = function () {
            mountCYDEditor('cyd-general-code');
            mountCYDEditor('cyd-general-code-end');
            const ta = document.getElementById('cyd-general-code');
            if (ta && ta._cmInstance) setTimeout(() => ta._cmInstance.refresh(), 0);
            const taEnd = document.getElementById('cyd-general-code-end');
            if (taEnd && taEnd._cmInstance) setTimeout(() => taEnd._cmInstance.refresh(), 0);
        };
    </script>
