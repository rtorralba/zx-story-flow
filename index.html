<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZX Story Flow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>
                <img src="images/logo_header.png" alt="ZX Story Flow" id="header-logo">
                <span id="project-name-display"></span>
            </h1>
            <nav class="menubar">
                <button id="add-screen-btn">📺 Screen</button>
                <button id="add-group-btn">📦 Group</button>
                <button id="add-reference-btn">🔗 Reference</button>

                <div class="menu">
                    <button class="menu-button">📁 Project</button>
                    <div class="submenu">
                        <button id="save-btn">💾 Save</button>
                        <button id="load-btn">📂 Load</button>
                    </div>
                </div>

                <div class="menu">
                    <button class="menu-button">📤 Export</button>
                    <div class="submenu submenu-right">
                        <button id="export-png-btn">🖼️ PNG Image</button>
                        <button id="export-tap-btn">📼 .TAP</button>
                        <button id="export-mucho-btn">📜 MuCho</button>
                        <button id="export-btn">⌨️ BASIC</button>
                    </div>
                </div>

                <button id="config-btn">⚙️ Config</button>
                <button id="fullscreen-btn" style="margin-left: auto;">⛶ Fullscreen</button>

                <input type="file" id="load-input" style="display: none;" accept=".json">
            </nav>
        </header>

        <main>
            <div id="editor-container">
                <canvas id="node-canvas"></canvas>
            </div>

            <aside id="property-panel" class="hidden">
                <h2>Properties</h2>
                <div id="properties-content">
                    <p>Select a node to edit properties.</p>
                </div>
                <hr>
                <section id="separator-config" style="display: none;">
                    <div class="config-row">
                        <label>
                            <input type="checkbox" id="use-custom-config">
                            Configuración específica
                        </label>
                    </div>
                    <div id="custom-config-content" style="display: none;">
                    <h3>Página</h3>
                    <div class="config-options">
                        <div class="config-row">
                            <label for="page-ink">INK:</label>
                            <select id="page-ink" name="page-ink">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                            <label for="page-paper" style="margin-left: 5px;">PAPER:</label>
                            <select id="page-paper" name="page-paper">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                        </div>
                        <div class="config-row">
                            <label for="page-bright">Bright</label>
                            <input type="checkbox" id="page-bright" name="page-bright">
                            <label for="page-flash" style="margin-left: 5px;">Flash</label>
                            <input type="checkbox" id="page-flash" name="page-flash">
                        </div>
                    </div>
                    <h3>Separador</h3>
                    <div class="config-options">
                        <div class="config-row">
                            <label for="separator-ink">INK:</label>
                            <select id="separator-ink" name="separator-ink">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                            <label for="separator-paper" style="margin-left: 5px;">PAPER:</label>
                            <select id="separator-paper" name="separator-paper">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                        </div>
                        <div class="config-row">
                            <label for="separator-bright">Bright</label>
                            <input type="checkbox" id="separator-bright" name="separator-bright">
                            <label for="separator-flash" style="margin-left: 5px;">Flash</label>
                            <input type="checkbox" id="separator-flash" name="separator-flash">
                        </div>
                    </div>
                    <h3>Opciones</h3>
                    <div class="config-options">
                        <div class="config-row">
                            <label for="interface-ink">INK:</label>
                            <select id="interface-ink" name="interface-ink">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                            <label for="interface-paper" style="margin-left: 5px;">PAPER:</label>
                            <select id="interface-paper" name="interface-paper">
                                <option value="black">Negro</option>
                                <option value="blue">Azul</option>
                                <option value="red">Rojo</option>
                                <option value="magenta">Magenta</option>
                                <option value="green">Verde</option>
                                <option value="cyan">Cyan</option>
                                <option value="yellow">Amarillo</option>
                                <option value="white">Blanco</option>
                            </select>
                        </div>
                        <div class="config-row">
                            <label for="interface-bright">Bright</label>
                            <input type="checkbox" id="interface-bright" name="interface-bright">
                            <label for="interface-flash" style="margin-left: 5px;">Flash</label>
                            <input type="checkbox" id="interface-flash" name="interface-flash">
                        </div>
                    </div>
                    </div>
                </section>
            </aside>
        </main>

        <!-- Modal de configuración global -->
        <div id="global-config-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            <h2>Configuración Global (por defecto)</h2>
            <h3>Página</h3>
            <div class="config-options">
                <div class="config-row">
                    <label for="global-page-ink">INK:</label>
                    <select id="global-page-ink">
                        <option value="black">Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white" selected>Blanco</option>
                    </select>
                    <label for="global-page-paper" style="margin-left: 5px;">PAPER:</label>
                    <select id="global-page-paper">
                        <option value="black" selected>Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white">Blanco</option>
                    </select>
                </div>
                <div class="config-row">
                    <label for="global-page-bright">Bright</label>
                    <input type="checkbox" id="global-page-bright">
                    <label for="global-page-flash" style="margin-left: 5px;">Flash</label>
                    <input type="checkbox" id="global-page-flash">
                </div>
            </div>
            <br><br>
            <h3>Separador</h3>
            <div class="config-options">
                <div class="config-row">
                    <label for="global-separator-ink">INK:</label>
                    <select id="global-separator-ink">
                        <option value="black">Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white" selected>Blanco</option>
                    </select>
                    <label for="global-separator-paper" style="margin-left: 5px;">PAPER:</label>
                    <select id="global-separator-paper">
                        <option value="black" selected>Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white">Blanco</option>
                    </select>
                </div>
                <div class="config-row">
                    <label for="global-separator-bright">Bright</label>
                    <input type="checkbox" id="global-separator-bright">
                    <label for="global-separator-flash" style="margin-left: 5px;">Flash</label>
                    <input type="checkbox" id="global-separator-flash">
                </div>
            </div>
            <br><br>
            <h3>Opciones</h3>
            <div class="config-options">
                <div class="config-row">
                    <label for="global-interface-ink">INK:</label>
                    <select id="global-interface-ink">
                        <option value="black">Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white" selected>Blanco</option>
                    </select>
                    <label for="global-interface-paper" style="margin-left: 5px;">PAPER:</label>
                    <select id="global-interface-paper">
                        <option value="black" selected>Negro</option>
                        <option value="blue">Azul</option>
                        <option value="red">Rojo</option>
                        <option value="magenta">Magenta</option>
                        <option value="green">Verde</option>
                        <option value="cyan">Cyan</option>
                        <option value="yellow">Amarillo</option>
                        <option value="white">Blanco</option>
                    </select>
                </div>
                <div class="config-row">
                    <label for="global-interface-bright">Bright</label>
                    <input type="checkbox" id="global-interface-bright">
                    <label for="global-interface-flash" style="margin-left: 5px;">Flash</label>
                    <input type="checkbox" id="global-interface-flash">
                </div>
            </div>
            <div class="modal-buttons">
                <button id="close-global-config">Cerrar</button>
            </div>
        </div>
        </div>

        <!-- Modal de edición de nodo -->
        <div id="node-edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" id="node-edit-modal-wrapper">
                <button class="modal-close-btn" id="node-edit-modal-close-btn">&times;</button>
                <h2 id="node-edit-modal-title">Editar Nodo</h2>
                <div id="node-edit-modal-content">
                    <!-- El contenido se generará dinámicamente -->
                </div>
                <div class="modal-buttons">
                    <button id="node-edit-modal-close">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
